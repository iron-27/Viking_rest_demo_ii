openapi: 3.0.3
info:
  title: Viking Board API
  version: 1.0.0
  description: REST API для проверки учебных методов добавления, удаления и полной перезаписи викингов.
servers:
  - url: http://localhost:8081
    description: Локальный запуск Spring Boot
paths:
  /api/vikings:
    get:
      tags: [Viking board]
      summary: Показать всех викингов из таблицы
      operationId: listVikingsFromBoard
      responses:
        '200':
          description: Записи таблицы возвращены
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Viking'
    post:
      tags: [Viking board]
      summary: Добавить конкретного викинга
      operationId: createExactViking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VikingRequest'
      responses:
        '201':
          description: Викинг добавлен в таблицу
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viking'
  /api/vikings/{id}:
    get:
      tags: [Viking board]
      summary: Открыть карточку викинга по id
      operationId: readVikingCard
      parameters:
        - $ref: '#/components/parameters/VikingId'
      responses:
        '200':
          description: Карточка найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viking'
        '404':
          description: Записи с таким id нет
    put:
      tags: [Viking board]
      summary: Перезаписать параметры конкретного викинга
      operationId: overwriteVikingCard
      parameters:
        - $ref: '#/components/parameters/VikingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VikingRequest'
      responses:
        '200':
          description: Параметры викинга полностью заменены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viking'
        '404':
          description: Не удалось найти запись для перезаписи
    delete:
      tags: [Viking board]
      summary: Удалить викинга из таблицы
      operationId: eraseVikingFromBoard
      parameters:
        - $ref: '#/components/parameters/VikingId'
      responses:
        '204':
          description: Запись удалена
        '404':
          description: Записи с таким id нет
  /api/vikings/test:
    get:
      tags: [Viking board]
      summary: Проверить, что контроллер отвечает
      operationId: showDemoNames
      responses:
        '200':
          description: Тестовые имена возвращены
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/vikings/post:
    post:
      tags: [Viking board]
      summary: Создать случайного викинга
      operationId: createRandomVikingForBoard
      responses:
        '201':
          description: Случайный викинг добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viking'
components:
  parameters:
    VikingId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
      example: 1
  schemas:
    Viking:
      allOf:
        - $ref: '#/components/schemas/VikingRequest'
        - type: object
          properties:
            id:
              type: integer
              format: int32
              example: 1
    VikingRequest:
      type: object
      required: [name, age, heightCm, hairColor, beardStyle, equipment]
      properties:
        name:
          type: string
          example: Ragnar
        age:
          type: integer
          format: int32
          example: 34
        heightCm:
          type: integer
          format: int32
          example: 182
        hairColor:
          $ref: '#/components/schemas/HairColor'
        beardStyle:
          $ref: '#/components/schemas/BeardStyle'
        equipment:
          type: array
          items:
            $ref: '#/components/schemas/EquipmentItem'
    EquipmentItem:
      type: object
      required: [name, quality]
      properties:
        name:
          type: string
          example: Axe
        quality:
          type: string
          example: Rare
    HairColor:
      type: string
      enum: [Blond, Red, Brown, Black, Gray]
      example: Blond
    BeardStyle:
      type: string
      enum: [SHORT, LONG, BRAIDED, FORKED, CLEAN_SHAVEN]
      example: BRAIDED
