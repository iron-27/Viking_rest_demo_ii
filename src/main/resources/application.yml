spring:
  application:
    name: viking-rest-demo-structural-fork
  datasource:
    url: jdbc:h2:file:./data/viking-demo-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

server:
  port: 8081

springdoc:
  swagger-ui:
    path: /swagger-ui.html
